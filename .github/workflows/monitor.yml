name: BASED monitor

on:
  schedule:
    - cron: "*/5 * * * *"    # 5분마다 (GitHub 사정에 따라 몇 분 지연될 수 있음)
  workflow_dispatch: {}       # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          BASED_CONTRACT: ${{ secrets.BASED_CONTRACT }}
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
        run: python check.py

      - name: Save state
        run: |
          git config user.name "based-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          git diff --cached --quiet || git commit -m "update state [skip ci]"
          git push || true
